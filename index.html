<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Calc</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Art Calc</h1>
        <p class="subtitle">Evenly space paintings across a wall and calculate nail heights.</p>

        <form id="setup-form" class="grid">
          <label>
            Eye height (in)
            <input id="eyeHeight" type="number" step="0.1" min="0" value="57" required />
          </label>

          <label>
            Number of paintings
            <input id="paintingCount" type="number" min="1" max="24" value="2" required />
          </label>

          <label>
            Wall width (in)
            <input id="wallWidth" type="number" step="0.1" min="1" value="120" required />
          </label>

          <button type="submit">Next: Painting Details</button>
        </form>

        <section id="details-section" class="details hidden">
          <h2>Painting Details (inches)</h2>
          <p class="hint">
            <strong>Wire distance</strong> = distance from the <strong>top edge of the painting</strong> down to the wire/hanger contact point where the nail sits when hung.
          </p>

          <form id="details-form">
            <div id="paintings-grid" class="paintings-grid"></div>
            <button type="submit">Calculate Nails</button>
          </form>
        </section>

        <section id="results" class="results hidden" aria-live="polite"></section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
